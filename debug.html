<!doctype html><html><head><meta charset="utf-8"><title>Debug</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px">
<h2 style="color:#f5c518">FishBakshish Debug</h2>
<div id="log"></div>
<script>
function log(msg,col){
  var d=document.createElement('div');
  d.style.color=col||'#fff';
  d.style.margin='4px 0';
  d.textContent=new Date().toISOString().slice(11,19)+' '+msg;
  document.getElementById('log').appendChild(d);
  console.log(msg);
}
const URL='https://raw.githubusercontent.com/emillion-lab/FishBakshish/main/taxi_data_SOF23.06.2026.json';
log('Start fetch...','#f5c518');
fetch(URL)
  .then(function(r){
    log('HTTP: '+r.status+' '+r.statusText, r.ok?'#22c55e':'#ef4444');
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  })
  .then(function(txt){
    log('Text received: '+Math.round(txt.length/1024)+'KB','#22c55e');
    try{
      var data=JSON.parse(txt);
      log('JSON parsed OK: '+data.length+' records','#22c55e');
      var sofia=data.filter(function(op){
        return !op.terminationDate&&
          (op.registratorMunicipalityName||'').startsWith('Община Столична');
      });
      log('Sofia operators: '+sofia.length,'#22c55e');
      log('SUCCESS! Data loads correctly.','#22c55e');
    }catch(e){
      log('JSON parse ERROR: '+e.message,'#ef4444');
    }
  })
  .catch(function(e){
    log('Fetch ERROR: '+e.message,'#ef4444');
  });
log('Fetch started, waiting...','#888');
</script>
</body></html>
